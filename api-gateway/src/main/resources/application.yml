server:
    port: 4007

spring:
    cloud:
        gateway:
            routes:
                - id: auth-service-route
                  uri: http://auth-service:4005
                  predicates:
                    - Path=/auth/**
                  filters:
                    - StripPrefix=1

                - id: users-service-route
                  uri: http://auth-service:4005
                  predicates:
                    - Path=/api/users/**
                  filters:
                    - StripPrefix=1
                    - JwtValidation

                - id: api-docs-auth-route
                  uri: http://auth-service:4005
                  predicates:
                    - Path=/api-docs/auth
                  filters:
                    - RewritePath=/api-docs/auth,/v3/api-docs

                - id: patient-service-route
                  uri: http://patient-service:4000
                  predicates:
                    - Path=/api/patients/**
                  filters:
                    - StripPrefix=1
                    - JwtValidation

                - id: billing-service-route
                  uri: http://billing-service:4002
                  predicates:
                    - Path=/api/billing/**
                  filters:
                    - RewritePath=/api/billing(?<remaining>/?.*),/billing-accounts${remaining}
                    - JwtValidation

                - id: analytics-service-route
                  uri: http://analytics-service:4004
                  predicates:
                    - Path=/api/analytics/**
                  filters:
                    - RewritePath=/api/analytics(?<remaining>/?.*),/analytics-events${remaining}
                    - JwtValidation

                - id: appointment-service-route
                  uri: http://appointment-service:4006
                  predicates:
                    - Path=/api/appointments/**
                  filters:
                    - StripPrefix=1
                    - JwtValidation

                - id: api-docs-patient-route
                  uri: http://patient-service:4000
                  predicates:
                    - Path=/api-docs/patients
                  filters:
                    - RewritePath=/api-docs/patients,/v3/api-docs

                - id: api-docs-billing-route
                  uri: http://billing-service:4002
                  predicates:
                    - Path=/api-docs/billing
                  filters:
                    - RewritePath=/api-docs/billing,/v3/api-docs

                - id: api-docs-analytics-route
                  uri: http://analytics-service:4004
                  predicates:
                    - Path=/api-docs/analytics
                  filters:
                    - RewritePath=/api-docs/analytics,/v3/api-docs

                - id: api-docs-appointment-route
                  uri: http://appointment-service:4006
                  predicates:
                    - Path=/api-docs/appointments
                  filters:
                    - RewritePath=/api-docs/appointments,/v3/api-docs