syntax = "proto3";

option java_multiple_files = true;
option java_package = "user";

service UserService {
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
    string userId = 1;
}

message GetUserResponse {
    string userId = 1;
    string email = 2;
    string role = 3;
    bool exists = 4;
}
