
services:
  patient-service-db:
    image: postgres:15
    container_name: patient-service-db
    environment:
      POSTGRES_DB: patientdb
      POSTGRES_USER: admin_viewer
      POSTGRES_PASSWORD: password
    ports:
      - "5001:5432"
    volumes:
      - ~/db_volumes/patient-service-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_viewer -d patientdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service-db:
    image: postgres:15
    container_name: auth-service-db
    environment:
      POSTGRES_DB: patientdb
      POSTGRES_USER: admin_viewer
      POSTGRES_PASSWORD: password
    ports:
      - "5002:5432"
    volumes:
      - ~/db_volumes/auth-service-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_viewer -d patientdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  billing-service-db:
    image: postgres:15
    container_name: billing-service-db
    environment:
      POSTGRES_DB: billingdb
      POSTGRES_USER: admin_viewer
      POSTGRES_PASSWORD: password
    ports:
      - "5004:5432"
    volumes:
      - ~/db_volumes/billing-service-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_viewer -d billingdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  analytics-service-db:
    image: postgres:15
    container_name: analytics-service-db
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: admin_viewer
      POSTGRES_PASSWORD: password
    ports:
      - "5003:5432"
    volumes:
      - ~/db_volumes/analytics-service-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_viewer -d analyticsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    image: patient-service:latest
    container_name: patient-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-service-db:5432/patientdb
      SPRING_DATASOURCE_USERNAME: admin_viewer
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9095
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - internal
    depends_on:
      - patient-service-db


  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: auth-service:latest
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-db:5432/patientdb
      SPRING_DATASOURCE_USERNAME: admin_viewer
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: myverylongsecretkeyforjwtauthentication12345678
    networks:
      - internal
    depends_on:
      auth-service-db:          
        condition: service_healthy

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    image: analytics-service:latest
    container_name: analytics-service
    ports:
      - "4004:4004"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://analytics-service-db:5432/analyticsdb
      SPRING_DATASOURCE_USERNAME: admin_viewer
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - internal
    depends_on:
      analytics-service-db:
        condition: service_healthy

  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    image: billing-service:latest
    container_name: billing-service
    ports:
      - "4002:4002"
      - "9095:9095"
    environment:
      GRPC_SERVER_PORT: 9095
      SERVER_PORT: 4002
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-service-db:5432/billingdb
      SPRING_DATASOURCE_USERNAME: admin_viewer
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - internal
    depends_on:
      billing-service-db:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    container_name: api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:4005
    ports:
      - "4007:4007"
    networks:
      - internal

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - internal

networks:
  internal:
    driver: bridge
